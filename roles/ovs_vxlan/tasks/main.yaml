---
- name: 1. Vérifier l' installation de openvswitch-switch
  ansible.builtin.apt:
    name: openvswitch-switch
    state: present

- name: 2. Vérifier que systemd-networkd est activé et démarré
  ansible.builtin.service:
    name: systemd-networkd
    state: started
    enabled: true

- name: 3. Générer la configuration Netplan pour le routeur (Rouge)
  ansible.builtin.template:
    src: netplan-router.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
    owner: root
    group: root
    mode: '0600'
  when: inventory_hostname == 'vm-red'
  notify: Apply Netplan

- name: 4. Générer la configuration Netplan pour les tenants (Bleu/Vert)
  ansible.builtin.template:
    src: netplan-tenant.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
    owner: root
    group: root
    mode: '0600'
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Apply Netplan

- name: 5. Appliquer Netplan
  ansible.builtin.meta: flush_handlers
