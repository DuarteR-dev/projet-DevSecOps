---
- name: 1. Installer les paquets
  ansible.builtin.apt:
    name:
      - openvswitch-switch
      - radvd
      - keepalived
    state: present
    update_cache: true

- name: 2. Correction du bug réseau VXLAN (udev)
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-net-offload.rules
    content: |
      ACTION=="add", SUBSYSTEM=="net", KERNEL=="veth*", RUN+="/sbin/ethtool -K $name tx off"
      ACTION=="add", SUBSYSTEM=="net", KERNEL=="vxlan*", RUN+="/sbin/ethtool -K $name tx off"
    mode: '0644'
  notify: Recharger les règles udev

- name: 3. Activer le routage IP
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: 4. Appliquer la configuration réseau Netplan
  ansible.builtin.template:
    src: 01-netcfg.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
    mode: '0600'
  notify: Apply Netplan

- name: 5. Forcer l'application du réseau avant de passer à Incus
  ansible.builtin.meta: flush_handlers

- name: 6. Configurer Keepalived pour la VIP
  ansible.builtin.template:
    src: keepalived.conf.j2
    dest: /etc/keepalived/keepalived.conf
    mode: '0644'
  notify: Recharger keepalived

- name: 7. Configurer radvd pour les annonces IPv6
  ansible.builtin.template:
    src: radvd.j2
    dest: /etc/radvd.conf
    mode: '0644'
  notify: Recharger radvd

- name: 8. Activer et démarrer le service radvd
  ansible.builtin.service:
    name: radvd
    state: started
    enabled: true

- name: 9. UFW - Autoriser le trafic Underlay (Inter-VMs)
  community.general.ufw:
    rule: allow
    src: 172.18.0.0/16

- name: 10. UFW - Autoriser le trafic Overlay IPv4 & IPv6 (Conteneurs INPUT)
  community.general.ufw:
    rule: allow
    src: "{{ item }}"
  loop: "{{ network_tenant_overlay_networks }}"

- name: 11. UFW - Autoriser le trafic Overlay IPv4 & IPv6 (Conteneurs FORWARD)
  community.general.ufw:
    rule: allow
    route: true
    src: "{{ item }}"
  loop: "{{ network_tenant_overlay_networks }}"

- name: 12. UFW - Autoriser le trafic retour d'Internet vers Overlay
  community.general.ufw:
    rule: allow
    route: true
    dest: "{{ item }}"
  loop: "{{ network_tenant_overlay_networks }}"

- name: 13. UFW - Autoriser Keepalived (VRRP) sur l'Overlay
  community.general.ufw:
    rule: allow
    proto: vrrp
    interface: "{{ ovs_bridge_name }}"
    direction: in

- name: 14. UFW - Autoriser le DHCP sur l'Overlay
  community.general.ufw:
    rule: allow
    port: '67'
    proto: udp
    interface: "{{ ovs_bridge_name }}"
    direction: in
