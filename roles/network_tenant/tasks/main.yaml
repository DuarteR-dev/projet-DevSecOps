---
- name: 1. Installer Open vSwitch
  ansible.builtin.apt:
    name: openvswitch-switch
    state: present

- name: 2. Correction du bug réseau VXLAN (udev)
  ansible.builtin.copy:
    dest: /etc/udev/rules.d/99-net-offload.rules
    content: |
      ACTION=="add", SUBSYSTEM=="net", KERNEL=="veth*", RUN+="/sbin/ethtool -K $name tx off"
      ACTION=="add", SUBSYSTEM=="net", KERNEL=="vxlan*", RUN+="/sbin/ethtool -K $name tx off"
  notify: Recharger les règles udev

- name: 3. Appliquer la configuration réseau Netplan
  ansible.builtin.template:
    src: 01-netcfg.yaml.j2
    dest: /etc/netplan/01-netcfg.yaml
  notify: Apply Netplan

- name: 4. UFW - Autoriser le trafic Underlay (Inter-VMs)
  community.general.ufw:
    rule: allow
    src: 172.18.0.0/16

- name: 5. UFW - Autoriser le trafic Overlay (Flux Conteneurs INPUT)
  community.general.ufw:
    rule: allow
    src: 192.0.2.0/24

- name: 6. UFW - Autoriser le trafic Overlay (Flux Conteneurs FORWARD)
  community.general.ufw:
    rule: allow
    route: true
    src: 192.0.2.0/24

- name: 7. UFW - Autoriser les interfaces locales (Bridge et VXLAN)
  community.general.ufw:
    rule: allow
    interface: "{{ item }}"
    direction: in
  loop:
    - "{{ ovs_bridge_name }}"
    - "vxlanGreenBlue"

- name: 8. Forcer l'application du réseau avant de passer à Incus
  ansible.builtin.meta: flush_handlers
