---
- name: Recharger les règles udev
  ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
  changed_when: true

- name: Apply Netplan
  ansible.builtin.command: netplan apply
  changed_when: true

- name: Recharger radvd
  ansible.builtin.service:
    name: radvd
    state: restarted
