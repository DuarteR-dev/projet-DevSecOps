---
# 1. Mettre à jour le système
- name: Mettre à jour le cache apt et les paquets
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
    upgrade: dist
    dpkg_options: 'force-confold,force-confdef'
  become: true
  environment:
    DEBIAN_FRONTEND: noninteractive

# 2. Installer les outils de base + Sécurité
- name: Installer les paquets requis
  ansible.builtin.apt:
    name:
      - fail2ban
      - ufw
      - tcpdump
      - vim
      - curl
    state: present
  become: true

# 3. Sécurisation de SSH via Drop-in file
- name: Sécuriser la configuration SSH
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
    content: |
      PermitRootLogin {{ permit_root_login | default('no') }}
      PasswordAuthentication {{ password_authentication | default('no') }}
    owner: root
    group: root
    mode: '0644'
  notify: Redémarrer SSH

# 4. Configurer le Pare-feu (UFW)
- name: UFW - Autoriser le routage (Forward) pour la VM Rouge
  community.general.ufw:
    default: allow
    direction: routed
  when: inventory_hostname == 'vm-red'
  notify: Recharger UFW

- name: UFW - Autoriser SSH uniquement depuis le réseau d'administration
  community.general.ufw:
    rule: allow
    port = {{ ssh_port | default('22') }}
    proto: tcp
    src: "{{ hostvars['localhost']['devnet_ip'] }}"
  notify: Recharger UFW

- name: UFW - Autoriser VXLAN (Uniquement pour Bleu et Vert)
  community.general.ufw:
    rule: allow
    port: '4789'
    proto: udp
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Activer le pare-feu et refuser par défaut en entrée
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

# 5. Fail2Ban
- name: Configurer le Jail Fail2Ban pour SSH
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled = true
      port = {{ ssh_port | default('22') }}
      filter = sshd
      logpath = /var/log/auth.log
      maxretry = 3
      bantime = 3600
    owner: root
    group: root
    mode: '0644'
  notify: Redémarrer Fail2Ban

- name: Activer et démarrer Fail2Ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

# 6. Activer le routage IP (Kernel Sysctl) pour la VM Routeur
- name: Activer le routage IPv4 et IPv6 au niveau du noyau
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: inventory_hostname == 'vm-red'
