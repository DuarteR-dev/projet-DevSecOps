---
# 1. activer le routage IPv4 et IPv6 au niveau du noyau sur TOUTES les VMs
- name: Activer le routage IPv4 et IPv6 au niveau du noyau
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    sysctl_set: true
    state: present
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding
  when: inventory_hostname in ['vm-red', 'vm-blue', 'vm-green']

# 2. installer UFW et configurer le NAT (Masquerading) sur la VM Rouge
- name: Installer UFW sur la VM Rouge pour le NAT
  ansible.builtin.apt:
    name: ufw
    state: present
    update_cache: true
  when: inventory_hostname == 'vm-red'

# 3. configurer le Masquerading (NAT) sur la VM Rouge
- name: UFW - Configurer le Masquerading (NAT) sur la VM Rouge
  ansible.builtin.blockinfile:
    path: /etc/ufw/before.rules
    insertbefore: BOF
    block: |
      *nat
      :POSTROUTING ACCEPT [0:0]
      -A POSTROUTING -s 172.18.169.0/24 -o vlan128 -j MASQUERADE
      -A POSTROUTING -s 172.18.170.0/24 -o vlan128 -j MASQUERADE
      -A POSTROUTING -s 192.0.2.0/24 -o vlan128 -j MASQUERADE
      COMMIT
  when: inventory_hostname == 'vm-red'
  notify: Recharger UFW

- name: UFW - Autoriser SSH sur la VM Rouge (prévention de blocage)
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port | default('22') }}"
    proto: tcp
  when: inventory_hostname == 'vm-red'

- name: UFW - Autoriser le routage (Forward) pour la VM Rouge
  community.general.ufw:
    default: allow
    direction: routed
  when: inventory_hostname == 'vm-red'

- name: UFW - Activer UFW sur la VM Rouge
  community.general.ufw:
    state: enabled
  when: inventory_hostname == 'vm-red'

- name: Forcer le rechargement UFW (exécute les handlers en attente)
  ansible.builtin.meta: flush_handlers

# 4. installer les outils de sécurité et de surveillance sur toutes les VMs
- name: Mettre à jour le cache apt
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Installer les paquets requis pour toutes les VMs
  ansible.builtin.apt:
    name:
      - ufw
      - tcpdump
      - vim
      - curl
    state: present
  become: true

# 5. Sécuriser la configuration SSH sur toutes les VMs
- name: Sécuriser la configuration SSH
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/99-ansible-hardening.conf
    content: |
      PermitRootLogin {{ permit_root_login | default('no') }}
      PasswordAuthentication {{ password_authentication | default('no') }}
    owner: root
    group: root
    mode: '0644'
  notify: Redémarrer SSH

# 6. Configurer UFW pour autoriser le trafic nécessaire et sécuriser les accès sur toutes les VMs
- name: UFW - Autoriser SSH depuis toutes les IP de la machine DevNet
  community.general.ufw:
    rule: allow
    port: "{{ ssh_port | default('22') }}"
    proto: tcp
    src: "{{ item }}"
  loop: "{{ hostvars['localhost']['ansible_all_ipv4_addresses'] }}"
  notify: Recharger UFW

- name: UFW - Autoriser le trafic Underlay (inclut VXLAN natif sur 4789/8472)
  community.general.ufw:
    rule: allow
    src: 172.18.0.0/16
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Autoriser le trafic entrant de l'Overlay (INPUT)
  community.general.ufw:
    rule: allow
    src: 192.0.2.0/24
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Autoriser le trafic routé/ponté de l'Overlay (FORWARD)
  community.general.ufw:
    rule: allow
    route: true
    src: 192.0.2.0/24
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Autoriser tout le trafic interne sur le bridge OVS
  community.general.ufw:
    rule: allow
    interface: "{{ ovs_bridge_name }}"
    direction: in
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Autoriser le trafic entrant depuis le tunnel VXLAN
  community.general.ufw:
    rule: allow
    interface: vxlanGreenBlue
    direction: in
  when: inventory_hostname in ['vm-blue', 'vm-green']
  notify: Recharger UFW

- name: UFW - Activer le pare-feu et refuser par défaut en entrée
  community.general.ufw:
    state: disabled  # <-- DESACTIVÉ POUR LE TEST
    policy: deny
    direction: incoming