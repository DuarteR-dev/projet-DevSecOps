---
- name: S'assurer que Incus est installé
  ansible.builtin.apt:
    name: incus
    state: present

- name: Initialiser Incus (Minimal)
  ansible.builtin.command: incus admin init --minimal
  args:
    creates: /var/lib/incus/cluster.crt
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Supprimer l'ancienne carte eth0 (pour éviter le conflit network/parent)
  ansible.builtin.command: incus profile device remove default eth0
  failed_when: false
  changed_when: false
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Attacher le profil par défaut au bridge OVS avec le bon MTU
  ansible.builtin.command: "incus profile device add default eth0 nic nictype=bridged parent={{ ovs_bridge_name }} mtu=1450"
  register: incus_profile_add
  changed_when: incus_profile_add.rc == 0
  failed_when: false
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Forcer la mise à jour si la carte existait déjà sans conflit (Fallback)
  ansible.builtin.command: "incus profile device set default eth0 parent {{ ovs_bridge_name }} mtu 1450"
  failed_when: false
  changed_when: false
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Configurer le MTU du profil par défaut pour correspondre à l'Overlay
  ansible.builtin.command: "incus profile device set default eth0 mtu 1450"
  register: incus_mtu_set
  changed_when: incus_mtu_set.rc == 0
  failed_when: false
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Nettoyer l'ancien conteneur de test c1 (s'il existe)
  ansible.builtin.command: "incus delete -f c1"
  failed_when: false
  changed_when: false
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Définir la topologie des conteneurs pour la VM Bleue
  ansible.builtin.set_fact:
    my_containers:
      - { name: 'blueC0', ip: '192.0.2.60' }
      - { name: 'blueC1', ip: '192.0.2.53' }
      - { name: 'blueC2', ip: '192.0.2.59' }
      - { name: 'blueDHCP', ip: '192.0.2.250' }
  when: inventory_hostname == 'vm-blue'

- name: Définir la topologie des conteneurs pour la VM Verte
  ansible.builtin.set_fact:
    my_containers:
      - { name: 'greenC0', ip: '192.0.2.19' }
      - { name: 'greenC1', ip: '192.0.2.20' }
      - { name: 'greenDHCP', ip: '192.0.2.251' }
  when: inventory_hostname == 'vm-green'

- name: Lancer les conteneurs requis par le lab
  ansible.builtin.command: "incus launch images:alpine/edge {{ item.name }}"
  args:
    creates: "/var/log/incus/{{ item.name }}"
  loop: "{{ my_containers }}"
  when: inventory_hostname in ['vm-blue', 'vm-green']

- name: Configurer les IPs statiques et le DNS dans les conteneurs (Simulation IPAM)
  ansible.builtin.shell: |
    incus exec {{ item.name }} -- sh -c "cat <<EOF > /etc/network/interfaces
    auto lo
    iface lo inet loopback

    auto eth0
    iface eth0 inet static
        address {{ item.ip }}
        netmask 255.255.255.0
        gateway 192.0.2.{{ '1' if inventory_hostname == 'vm-blue' else '2' }}
    EOF"
    incus exec {{ item.name }} -- sh -c "echo 'nameserver 8.8.8.8' > /etc/resolv.conf"
    incus restart {{ item.name }}
  loop: "{{ my_containers }}"
  when: inventory_hostname in ['vm-blue', 'vm-green']
  changed_when: true

- name: Désactiver l'offloading TX sur l'hôte (APRÈS la création des conteneurs)
  ansible.builtin.shell: |
    sleep 5
    # Désactiver sur toutes les interfaces veth des conteneurs
    for iface in $(ip -o link show type veth | awk '{print $2}' | cut -d@ -f1); do
      ethtool -K $iface tx off >/dev/null 2>&1 || true
    done
    # Désactiver sur le tunnel VXLAN
    ethtool -K vxlanGreenBlue tx off >/dev/null 2>&1 || true
  when: inventory_hostname in ['vm-blue', 'vm-green']
  changed_when: true
