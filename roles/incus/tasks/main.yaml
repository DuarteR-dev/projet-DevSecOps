---
- name: 0. Installer le paquet Incus
  ansible.builtin.apt:
    name: incus
    state: present
    update_cache: true

- name: 1. Initialiser Incus
  ansible.builtin.command: incus admin init --minimal
  args:
    creates: /var/lib/incus/cluster.crt

- name: 2. Vérifier le bridge OVS
  ansible.builtin.command: incus profile show default
  register: incus_profile_output
  changed_when: false

- name: 3. Configurer le bridge OVS
  ansible.builtin.shell: |
    incus profile device remove default eth0 || true
    incus profile device add default eth0 nic nictype=bridged parent={{ ovs_bridge_name }} mtu={{ overlay_mtu }}
  when: "ovs_bridge_name not in incus_profile_output.stdout"
  changed_when: true

- name: 4. Vérifier les conteneurs existants
  ansible.builtin.command: incus list -c n --format csv
  register: incus_list
  changed_when: false

- name: 5. Lancer les conteneurs Alpine
  ansible.builtin.command: "incus launch images:alpine/edge {{ item.name }}"
  loop: "{{ my_containers }}"
  when: "item.name not in incus_list.stdout"
  register: incus_launch
  changed_when: true

- name: 6. Injecter la configuration réseau de base
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      incus exec {{ item.name }} -- sysctl -w net.ipv6.conf.eth0.accept_ra=2
      cat <<EOF | incus file push - {{ item.name }}/etc/network/interfaces
      auto lo
      iface lo inet loopback

      auto eth0
      {% if item.type == 'dhcp' %}
      iface eth0 inet static
          address {{ item.ip }}/24
          gateway {{ overlay_gw_v4 }}
      {% else %}
      iface eth0 inet dhcp
      {% endif %}
      EOF
  loop: "{{ my_containers }}"
  changed_when: false

- name: 7. Redémarrer les serveurs DHCP
  ansible.builtin.command: incus restart {{ item.name }}
  loop: "{{ my_containers }}"
  when: item.type == 'dhcp'
  changed_when: true

- name: 8. Attendre que les conteneurs DHCP soient opérationnels
  ansible.builtin.command: "incus exec {{ item.name }} -- ip -4 addr show eth0"
  register: incus_dhcp_ip_check
  until: "'inet ' in incus_dhcp_ip_check.stdout"
  retries: 15
  delay: 2
  loop: "{{ my_containers }}"
  when: item.type == 'dhcp'
  changed_when: false

- name: 9. Installer et configurer dnsmasq sur les conteneurs DHCP
  ansible.builtin.shell:
    cmd: |
      set -o pipefail
      incus exec {{ item.name }} -- sh -c 'echo "nameserver {{ dns_server }}" > /etc/resolv.conf'
      incus exec {{ item.name }} -- apk update
      incus exec {{ item.name }} -- apk add dnsmasq
      cat <<EOF | incus file push - {{ item.name }}/etc/dnsmasq.conf
      interface=eth0
      port=0
      dhcp-range={{ item.dhcp_range }},255.255.255.0,12h
      dhcp-option=option:router,{{ overlay_ip_v4.split('/')[0] }}
      dhcp-option=option:dns-server,{{ dns_server }}
      EOF
      incus exec {{ item.name }} -- rc-update add dnsmasq default
      incus exec {{ item.name }} -- rc-service dnsmasq restart || /etc/init.d/dnsmasq restart
  loop: "{{ my_containers }}"
  when: item.type == 'dhcp'
  changed_when: false

- name: 10. Redémarrer les clients pour déclencher DHCP
  ansible.builtin.command: incus restart {{ item.item.name }}
  loop: "{{ incus_launch.results }}"
  loop_control:
    label: "{{ item.item.name }}"
  when: item.changed | default(false) and item.item.type == 'client'
  changed_when: true

- name: 11. Attendre que les conteneurs clients aient reçu leur IP via DHCP
  ansible.builtin.command: "incus exec {{ item.name }} -- ip -4 addr show eth0"
  register: incus_client_ip_check
  until: "'inet ' in incus_client_ip_check.stdout"
  retries: 15
  delay: 2
  loop: "{{ my_containers }}"
  when: item.type == 'client'
  changed_when: false

- name: 12. Installer Nginx et forcer la configuration du serveur Web
  ansible.builtin.shell:
    cmd: |
      incus exec {{ item.name }} -- apk update
      incus exec {{ item.name }} -- apk add nginx
      incus exec {{ item.name }} -- mkdir -p /var/www/html
      incus exec {{ item.name }} -- sh -c 'echo "server { listen 80; root /var/www/html; index index.html; }" > /etc/nginx/http.d/default.conf'
      incus exec {{ item.name }} -- sh -c 'echo "<h1>Bienvenue sur {{ item.name }} (Tenant VXLAN)</h1>" > /var/www/html/index.html'
      incus exec {{ item.name }} -- rc-update add nginx default
      incus exec {{ item.name }} -- rc-service nginx restart || /etc/init.d/nginx restart
  loop: "{{ my_containers }}"
  when: item.type == 'client'
  changed_when: false
