---
- name: 1. Créer le répertoire du projet sur l'hyperviseur
  ansible.builtin.file:
    path: "{{ lab_path }}"
    state: directory
    mode: '0755'

- name: 2. Pré-créer les disques virtuels
  ansible.builtin.command: >
    qemu-img create -f qcow2 -F qcow2 -b {{ ansible_env.HOME }}/masters/{{ hostvars[item]['master_image'] }}
    {{ lab_path }}/{{ hostvars[item]['vm_name'] }}.qcow2
  loop: "{{ groups['vms'] }}"
  args:
    creates: "{{ lab_path }}/{{ hostvars[item]['vm_name'] }}.qcow2"

- name: 3. Générer le Netplan
  ansible.builtin.template:
    src: baking-netplan.j2
    dest: "{{ lab_path }}/{{ item }}-netplan.yaml"
    mode: '0600'
  loop: "{{ groups['vms'] }}"

- name: 4. Injecter le Netplan et la clé SSH
  ansible.builtin.command: >
    virt-customize -a {{ lab_path }}/{{ hostvars[item]['vm_name'] }}.qcow2
    --hostname {{ hostvars[item]['vm_name'] }}
    --upload {{ lab_path }}/{{ item }}-netplan.yaml:/etc/netplan/01-netcfg.yaml
    --ssh-inject etu:file:{{ ansible_env.HOME }}/.ssh/authorized_keys
  loop: "{{ groups['vms'] }}"
  args:
    creates: "{{ lab_path }}/.{{ hostvars[item]['vm_name'] }}_baked"
  register: provision_vms_baking_result
  notify: Créer témoin

- name: 5. Générer switch.yaml
  ansible.builtin.template:
    src: switch.yaml.j2
    dest: "{{ lab_path }}/switch.yaml"
    mode: '0644'

- name: 6. Générer lab.yaml
  ansible.builtin.template:
    src: lab.yaml.j2
    dest: "{{ lab_path }}/lab.yaml"
    mode: '0644'

- name: 7. Appliquer la configuration du switch OVS
  ansible.builtin.command: "{{ ansible_env.HOME }}/masters/scripts/switch-conf.py --apply {{ lab_path }}/switch.yaml"
  register: provision_vms_switch_result
  changed_when: provision_vms_switch_result.rc == 0

- name: 8. Démarrer les VMs
  ansible.builtin.command: "{{ ansible_env.HOME }}/masters/scripts/lab-startup.py {{ lab_path }}/lab.yaml"
  args:
    chdir: "{{ lab_path }}"
  register: provision_vms_startup_result
  changed_when: true
