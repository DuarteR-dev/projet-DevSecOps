---
- name: Créer le répertoire du projet sur l'hyperviseur
  file:
    path: "{{ lab_path }}"
    state: directory
    mode: '0755'

- name: Générer le fichier de configuration du switch (switch.yaml)
  template:
    src: switch.yaml.j2
    dest: "{{ lab_path }}/switch.yaml"
    mode: '0644'

- name: Générer le fichier de définition des VMs (lab.yaml)
  template:
    src: lab.yaml.j2
    dest: "{{ lab_path }}/lab.yaml"
    mode: '0644'

- name: Appliquer la configuration du switch OVS
  command: "{{ ansible_env.HOME }}/masters/scripts/switch-conf.py --apply {{ lab_path }}/switch.yaml"
  register: provision_vms_switch_result
  changed_when: provision_vms_switch_result.rc == 0

- name: Démarrer les VMs du lab via le script académique
  command: "{{ ansible_env.HOME }}/masters/scripts/lab-startup.py {{ lab_path }}/lab.yaml"
  register: provision_vms_startup_result
  changed_when: provision_vms_startup_result.rc == 0
