---
- name: 1. Provisionnement de l'infrastructure
  hosts: hypervisors
  become: false
  vars_files:
    - .iac_passwd.yaml
  roles:
    - provision_vms

- name: 2. Lancement de la configuration
  import_playbook: site.yaml

- name: 3. Validation du réseau et de l'interconnexion
  import_playbook: check_network.yaml

- name: 4. Audit de Sécurité DevSecOps
  import_playbook: check_security.yaml
