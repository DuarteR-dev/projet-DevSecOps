name: CI DevSecOps Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  security-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout du code (Historique complet pour Gitleaks)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 2. Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 4. Installer les dépendances Python et Ansible
        run: |
          pip install -r requirements.txt
          pip install ansible-lint
          ansible-galaxy collection install -r requirements.yaml

      - name: 5. Créer les fichiers secrets factices pour la CI
        run: |
          touch .vault_pass.txt
          touch .iac_passwd.yaml

      - name: 6. Run Ansible Lint
        run: ansible-lint -c .ansible-lint
        env:
          ANSIBLE_FORCE_COLOR: '1'

      - name: 7. Run Checkov (SAST IaC)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: ansible
          quiet: true
          skip_path: ".iac_passwd.yaml"