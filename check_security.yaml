---
- name: Audit de Sécurité DevSecOps
  hosts: vms
  become: true
  vars_files:
    - .iac_passwd.yaml
  tasks:
    - name: Récupérer l'état des services du système
      ansible.builtin.service_facts:

    - name: Récupérer la configuration SSH effective (active)
      ansible.builtin.command: sshd -T
      register: sshd_config_dump
      changed_when: false

    - name: Valider la désactivation de PermitRootLogin
      ansible.builtin.assert:
        that:
          - "'permitrootlogin no' in sshd_config_dump.stdout"
        success_msg: "Sécurité SSH (1/2) : Root ne peut pas se connecter."
        fail_msg: "VULNÉRABILITÉ : PermitRootLogin n'est pas désactivé !"

    - name: Valider la désactivation de PasswordAuthentication
      ansible.builtin.assert:
        that:
          - "'passwordauthentication no' in sshd_config_dump.stdout"
        success_msg: "Sécurité SSH (2/2) : L'authentification par mot de passe est désactivée."
        fail_msg: "VULNÉRABILITÉ : L'authentification par mot de passe est toujours active !"

    - name: Récupérer le statut de UFW
      ansible.builtin.command: ufw status
      register: ufw_status
      changed_when: false

    - name: Vérifier que le pare-feu UFW est bien actif
      ansible.builtin.assert:
        that:
          - "'active' in ufw_status.stdout or 'actif' in ufw_status.stdout"
        success_msg: "Sécurité Réseau : Le pare-feu UFW est bien actif et filtre le trafic."
        fail_msg: "VULNÉRABILITÉ : Le pare-feu UFW n'est pas actif !"

    - name: Rapport d'Audit
      ansible.builtin.debug:
        msg: >
          "Audit DevSecOps terminé avec succès :
           Les politiques de sécurité (SSH durci et UFW actif)
           sont appliquées et vérifiées sur {{ inventory_hostname }}."
